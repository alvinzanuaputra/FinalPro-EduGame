      <stop offset="0%" stop-color="#5c3a21" />
      <stop offset="100%" stop-color="#3e2312" />
    </linearGradient>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2a2a35" />
      <stop offset="100%" stop-color="#15151a" />
    </linearGradient>
  </defs>
  <!-- Room Background -->
  <rect width="1280" height="720" fill="url(#bg)" />
  
  <!-- Table -->
