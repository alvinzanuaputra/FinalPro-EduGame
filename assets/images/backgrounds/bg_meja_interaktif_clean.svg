  <!-- Table edge highlight -->
  <rect x="100" y="300" width="1080" height="15" fill="#754b2c" rx="5" />
  
  <!-- Wood lines for texture -->
  <path d="M 150 350 L 1130 350 M 120 450 L 1160 450 M 140 550 L 1140 550 M 110 650 L 1170 650" stroke="#351e0f" stroke-width="2" fill="none" opacity="0.5" />
